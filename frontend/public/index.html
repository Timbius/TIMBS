<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barber Factory</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
        }

        /* Шапка */
        .header {
            background: #1a1a1a;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
        }

        .nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            cursor: pointer;
        }

        .nav a:hover {
            text-decoration: underline;
        }

        /* Контейнер для контента */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            min-height: 60vh;
        }

        /* Формы */
        .form-card {
            max-width: 400px;
            margin: 0 auto;
            padding: 30px;
            background: #f4f4f4;
            border-radius: 8px;
        }

        .form-card h2 {
            margin-bottom: 20px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            width: 100%;
            background: #1a1a1a;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #333;
        }

        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
        }

        .error {
            background: #ffe0e0;
            color: red;
        }

        .success {
            background: #e0ffe0;
            color: green;
        }

        /* Профиль */
        .profile-info {
            background: #f4f4f4;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .logout-btn {
            background: #dc3545;
            width: auto;
            padding: 10px 20px;
        }

        .logout-btn:hover {
            background: #c82333;
        }

        /* Главная */
        .hero {
            text-align: center;
            padding: 60px 20px;
            background: #f9f9f9;
            border-radius: 8px;
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 18px;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            background: #1a1a1a;
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 5px;
            margin: 0 10px;
            cursor: pointer;
            border: none;
            font-size: 16px;
        }

        .btn:hover {
            background: #333;
        }

        /* Каталог услуг */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .service-card {
            background: #f9f9f9;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .service-card h3 {
            margin-bottom: 10px;
        }

        .service-card .price {
            font-size: 20px;
            font-weight: bold;
            color: #1a1a1a;
            margin: 10px 0;
        }

        .service-card .category {
            color: #666;
            font-size: 14px;
        }

        .service-actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        .service-actions button {
            width: auto;
            padding: 8px 15px;
            font-size: 14px;
        }

        .edit-btn {
            background: #007bff;
        }

        .edit-btn:hover {
            background: #0056b3;
        }

        .delete-btn {
            background: #dc3545;
        }

        .delete-btn:hover {
            background: #c82333;
        }

        /* Форма услуги */
        .service-form {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
            background: #f4f4f4;
            border-radius: 8px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-group input {
            width: auto;
        }

        /* Кнопки навигации */
        .nav-buttons {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: #6c757d;
            width: auto;
            padding: 8px 15px;
        }

        .nav-btn:hover {
            background: #5a6268;
        }

        footer {
            background: #1a1a1a;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo" onclick="navigateTo('home')">Barber Factory</div>
        <div class="nav">
            <a onclick="navigateTo('home')">Главная</a>
            <a onclick="navigateTo('catalog')">Услуги</a>
            <a onclick="navigateTo('profile')" id="profileLink" style="display: none;">Профиль</a>
            <a onclick="navigateTo('login')" id="loginLink">Вход</a>
            <a onclick="logout()" id="logoutLink" style="display: none;">Выйти</a>
        </div>
    </div>

    <div class="container" id="app">
        <!-- Сюда загружается контент -->
    </div>

    <footer>
        <p>Barber Factory © 2025 | Адрес: ул. Примерная, 123 | Телефон: +7 (999) 123-45-67</p>
    </footer>

    <script>
        const API_URL = 'http://localhost:5000/api';

        // Проверка авторизации
        function isAuthenticated() {
            return !!localStorage.getItem('token');
        }

        // Получить токен
        function getToken() {
            return localStorage.getItem('token');
        }

        // Получить пользователя
        function getUser() {
            const user = localStorage.getItem('user');
            return user ? JSON.parse(user) : null;
        }

        // Обновление навигации
        function updateNavigation() {
            const isAuth = isAuthenticated();
            document.getElementById('profileLink').style.display = isAuth ? 'inline' : 'none';
            document.getElementById('loginLink').style.display = isAuth ? 'none' : 'inline';
            document.getElementById('logoutLink').style.display = isAuth ? 'inline' : 'none';
        }

        // Выход
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            updateNavigation();
            navigateTo('home');
        }

        // Навигация
        function navigateTo(page, id = null) {
            if (page === 'home') {
                renderHome();
            } else if (page === 'login') {
                renderLogin();
            } else if (page === 'register') {
                renderRegister();
            } else if (page === 'profile') {
                if (isAuthenticated()) {
                    renderProfile();
                } else {
                    renderLogin();
                }
            } else if (page === 'catalog') {
                renderCatalog();
            } else if (page === 'serviceEdit' && id) {
                renderServiceForm(id);
            } else if (page === 'serviceCreate') {
                renderServiceForm();
            }
        }

        // Главная страница
        function renderHome() {
            document.getElementById('app').innerHTML = `
                <div class="hero">
                    <h1>Добро пожаловать в Barber Factory</h1>
                    <p>Стильные стрижки, бритьё и уход за собой. Запишитесь онлайн!</p>
                    <button class="btn" onclick="navigateTo('register')">Зарегистрироваться</button>
                    <button class="btn" onclick="navigateTo('login')">Войти</button>
                    <button class="btn" onclick="navigateTo('catalog')">Смотреть услуги</button>
                </div>
            `;
        }

        // Страница входа
        function renderLogin() {
            document.getElementById('app').innerHTML = `
                <div class="form-card">
                    <h2>Вход</h2>
                    <form id="loginForm">
                        <div class="form-group">
                            <label for="email">Email:</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="password">Пароль:</label>
                            <input type="password" id="password" name="password" required>
                        </div>
                        <button type="submit">Войти</button>
                        <div id="message"></div>
                    </form>
                    <p style="text-align: center; margin-top: 15px;">
                        Нет аккаунта? <a onclick="navigateTo('register')" style="cursor: pointer; color: #1a1a1a;">Зарегистрируйтесь</a>
                    </p>
                </div>
            `;

            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const messageDiv = document.getElementById('message');

                try {
                    const response = await fetch(`${API_URL}/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        localStorage.setItem('token', data.token);
                        localStorage.setItem('user', JSON.stringify(data.user));
                        messageDiv.innerHTML = '<div class="message success">Вход выполнен!</div>';
                        updateNavigation();
                        setTimeout(() => navigateTo('profile'), 1000);
                    } else {
                        messageDiv.innerHTML = `<div class="message error">${data.message || 'Ошибка входа'}</div>`;
                    }
                } catch (error) {
                    messageDiv.innerHTML = '<div class="message error">Ошибка соединения с сервером</div>';
                }
            });
        }

        // Страница регистрации
        function renderRegister() {
            document.getElementById('app').innerHTML = `
                <div class="form-card">
                    <h2>Регистрация</h2>
                    <form id="registerForm">
                        <div class="form-group">
                            <label for="name">Имя:</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email:</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="password">Пароль:</label>
                            <input type="password" id="password" name="password" required>
                        </div>
                        <button type="submit">Зарегистрироваться</button>
                        <div id="message"></div>
                    </form>
                    <p style="text-align: center; margin-top: 15px;">
                        Уже есть аккаунт? <a onclick="navigateTo('login')" style="cursor: pointer; color: #1a1a1a;">Войдите</a>
                    </p>
                </div>
            `;

            document.getElementById('registerForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const name = document.getElementById('name').value;
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const messageDiv = document.getElementById('message');

                try {
                    const response = await fetch(`${API_URL}/auth/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, email, password })
                    });

                    const data = await response.json();

                    if (response.ok) {
                        localStorage.setItem('token', data.token);
                        localStorage.setItem('user', JSON.stringify(data.user));
                        messageDiv.innerHTML = '<div class="message success">Регистрация успешна!</div>';
                        updateNavigation();
                        setTimeout(() => navigateTo('profile'), 1000);
                    } else {
                        messageDiv.innerHTML = `<div class="message error">${data.message || 'Ошибка регистрации'}</div>`;
                    }
                } catch (error) {
                    messageDiv.innerHTML = '<div class="message error">Ошибка соединения с сервером</div>';
                }
            });
        }

        // Страница профиля
        async function renderProfile() {
            const token = getToken();
            if (!token) {
                navigateTo('login');
                return;
            }

            document.getElementById('app').innerHTML = `
                <div class="profile-info">
                    <h3>Информация о пользователе</h3>
                    <p><strong>Имя:</strong> <span id="userName">Загрузка...</span></p>
                    <p><strong>Email:</strong> <span id="userEmail">Загрузка...</span></p>
                    <p><strong>Роль:</strong> <span id="userRole">Загрузка...</span></p>
                </div>
                <button class="logout-btn" onclick="logout()">Выйти</button>
            `;

            try {
                const response = await fetch(`${API_URL}/auth/me`, {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const user = await response.json();
                    document.getElementById('userName').textContent = user.name;
                    document.getElementById('userEmail').textContent = user.email;
                    document.getElementById('userRole').textContent = user.role;
                } else {
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                    updateNavigation();
                    navigateTo('login');
                }
            } catch (error) {
                console.error('Error:', error);
                navigateTo('login');
            }
        }

        // Каталог услуг
        async function renderCatalog() {
            const token = getToken();
            const user = getUser();
            const isAdmin = user && user.role === 'admin';

            document.getElementById('app').innerHTML = `
                <div class="nav-buttons">
                    <button class="nav-btn" onclick="navigateTo('home')">← На главную</button>
                    ${isAdmin ? '<button class="nav-btn" onclick="navigateTo(\'serviceCreate\')">+ Добавить услугу</button>' : ''}
                </div>
                <h2>Наши услуги</h2>
                <div id="servicesList" class="services-grid">Загрузка...</div>
            `;

            try {
                const response = await fetch(`${API_URL}/services`);
                const services = await response.json();

                if (!response.ok) {
                    document.getElementById('servicesList').innerHTML = `<p>Ошибка загрузки услуг</p>`;
                    return;
                }

                if (services.length === 0) {
                    document.getElementById('servicesList').innerHTML = `<p>Услуг пока нет</p>`;
                    return;
                }

                let html = '';
                for (const service of services) {
                    html += `
                        <div class="service-card">
                            <span class="category">${service.category || 'Услуга'}</span>
                            <h3>${escapeHtml(service.title)}</h3>
                            <p>${escapeHtml(service.description || 'Описание отсутствует')}</p>
                            <div class="price">${service.price} ₽</div>
                            ${service.isPopular ? '<span style="color: gold;">★ Популярная</span>' : ''}
                            ${isAdmin ? `
                                <div class="service-actions">
                                    <button class="edit-btn" onclick="navigateTo('serviceEdit', ${service.id})">Редактировать</button>
                                    <button class="delete-btn" onclick="deleteService(${service.id})">Удалить</button>
                                </div>
                            ` : ''}
                        </div>
                    `;
                }
                document.getElementById('servicesList').innerHTML = html;
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('servicesList').innerHTML = `<p>Ошибка загрузки услуг</p>`;
            }
        }

        // Форма создания/редактирования услуги
        async function renderServiceForm(id = null) {
            const token = getToken();
            if (!token) {
                navigateTo('login');
                return;
            }

            const isEdit = !!id;
            let service = { title: '', description: '', price: '', category: '', imageUrl: '', isPopular: false };

            if (isEdit) {
                try {
                    const response = await fetch(`${API_URL}/services/${id}`);
                    if (response.ok) {
                        service = await response.json();
                    } else {
                        navigateTo('catalog');
                        return;
                    }
                } catch (error) {
                    navigateTo('catalog');
                    return;
                }
            }

            document.getElementById('app').innerHTML = `
                <div class="service-form">
                    <h2>${isEdit ? 'Редактировать услугу' : 'Добавить услугу'}</h2>
                    <form id="serviceForm">
                        <div class="form-group">
                            <label for="title">Название *</label>
                            <input type="text" id="title" value="${escapeHtml(service.title)}" required>
                        </div>
                        <div class="form-group">
                            <label for="description">Описание</label>
                            <textarea id="description">${escapeHtml(service.description || '')}</textarea>
                        </div>
                        <div class="form-group">
                            <label for="price">Цена *</label>
                            <input type="number" id="price" value="${service.price}" step="0.01" required>
                        </div>
                        <div class="form-group">
                            <label for="category">Категория</label>
                            <input type="text" id="category" value="${escapeHtml(service.category || '')}">
                        </div>
                        <div class="form-group">
                            <label for="imageUrl">URL изображения</label>
                            <input type="text" id="imageUrl" value="${escapeHtml(service.imageUrl || '')}">
                        </div>
                        <div class="form-group checkbox-group">
                            <input type="checkbox" id="isPopular" ${service.isPopular ? 'checked' : ''}>
                            <label for="isPopular">Популярная услуга</label>
                        </div>
                        <button type="submit">${isEdit ? 'Сохранить' : 'Создать'}</button>
                        <div id="message"></div>
                    </form>
                    <button class="nav-btn" onclick="navigateTo('catalog')" style="margin-top: 10px;">Отмена</button>
                </div>
            `;

            document.getElementById('serviceForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const title = document.getElementById('title').value;
                const description = document.getElementById('description').value;
                const price = parseFloat(document.getElementById('price').value);
                const category = document.getElementById('category').value;
                const imageUrl = document.getElementById('imageUrl').value;
                const isPopular = document.getElementById('isPopular').checked;
                const messageDiv = document.getElementById('message');

                if (!title || !price) {
                    messageDiv.innerHTML = '<div class="message error">Заполните название и цену</div>';
                    return;
                }

                const method = isEdit ? 'PUT' : 'POST';
                const url = isEdit ? `${API_URL}/services/${id}` : `${API_URL}/services`;

                try {
                    const response = await fetch(url, {
                        method: method,
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ title, description, price, category, imageUrl, isPopular })
                    });

                    if (response.ok) {
                        messageDiv.innerHTML = '<div class="message success">Услуга сохранена!</div>';
                        setTimeout(() => navigateTo('catalog'), 1000);
                    } else {
                        const data = await response.json();
                        messageDiv.innerHTML = `<div class="message error">${data.message || 'Ошибка'}</div>`;
                    }
                } catch (error) {
                    messageDiv.innerHTML = '<div class="message error">Ошибка соединения</div>';
                }
            });
        }

        // Удаление услуги
        async function deleteService(id) {
            if (!confirm('Удалить эту услугу?')) return;

            const token = getToken();
            if (!token) {
                navigateTo('login');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/services/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    renderCatalog();
                } else {
                    alert('Ошибка удаления');
                }
            } catch (error) {
                alert('Ошибка соединения');
            }
        }

        // Экранирование HTML
        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // Инициализация
        updateNavigation();
        navigateTo('home');
    </script>
</body>
</html>
